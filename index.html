<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENDE Luxury</title>

<style>
body {
margin:0;
font-family:Arial;
background:#050505;
color:white;
}

/* HERO */
header {
height:100vh;
background:linear-gradient(rgba(0,0,0,0.7),black),
url('https://images.unsplash.com/photo-1550547660-d9450f859349') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

h1 {
font-size:55px;
color:#d4af37;
letter-spacing:3px;
}

.btn {
padding:12px 25px;
margin:5px;
border:none;
border-radius:30px;
font-size:15px;
}

.gold {background:#d4af37;color:black;}
.dark {background:#222;color:white;}

/* SECTION */
.section {padding:40px 20px;}

h2 {color:#d4af37;text-align:center;}

/* FILTER */
.filter {text-align:center;margin-bottom:20px;}
.filter button {
margin:5px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#222;
color:white;
}

/* MENU */
.menu {
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card {
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card:hover {transform:scale(1.03);}

.card img {
width:100%;
height:150px;
object-fit:cover;
}

.card h3 {margin:10px;}
.card p {margin:0 10px 10px;color:#aaa;}

.card button {
width:90%;
margin:10px;
padding:10px;
border:none;
border-radius:20px;
background:#d4af37;
}

/* CART */
.cart {
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:10px;
border-top:1px solid #d4af37;
}

.cart-item {
display:flex;
justify-content:space-between;
margin:5px 0;
}

/* FOOTER */
footer {
text-align:center;
padding:20px;
}
</style>

</head>

<body>

<header>
<h1>MENDE</h1>
<p>Luxury Street Food • Tbilisi</p>

<button class="btn gold" onclick="call()">დარეკვა</button>
<button class="btn dark" onclick="whatsapp()">WhatsApp</button>
<button class="btn dark" onclick="maps()">რუქა</button>
</header>

<section class="section">
<h2>მენიუ</h2>

<div class="filter">
<button onclick="filter('all')">ყველა</button>
<button onclick="filter('georgian')">ქართული</button>
<button onclick="filter('fast')">სწრაფი</button>
</div>

<div class="menu">

<div class="card georgian">
<img src="https://images.unsplash.com/photo-1548365328-9f547fb0953d">
<h3>ხაჭაპური</h3>
<p>10₾</p>
<button onclick="add('ხაჭაპური',10)">დამატება</button>
</div>

<div class="card georgian">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<h3>ლობიანი</h3>
<p>8₾</p>
<button onclick="add('ლობიანი',8)">დამატება</button>
</div>

<div class="card fast">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h3>ბურგერი</h3>
<p>15₾</p>
<button onclick="add('ბურგერი',15)">დამატება</button>
</div>

<div class="card fast">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<h3>სალათი</h3>
<p>7₾</p>
<button onclick="add('სალათი',7)">დამატება</button>
</div>

<div class="card georgian">
<img src="https://images.unsplash.com/photo-1625944525903-bd5f7cba3d0f">
<h3>გებჟალია</h3>
<p>11₾</p>
<button onclick="add('გებჟალია',11)">დამატება</button>
</div>

<div class="card georgian">
<img src="https://images.unsplash.com/photo-1617196035154-1e3f0b4b3c7a">
<h3>თევზი</h3>
<p>18₾</p>
<button onclick="add('თევზი',18)">დამატება</button>
</div>

</div>
</section>

<div class="cart" id="cart"></div>

<footer>
📍 თბილისი • 📞 597122552 • @giga_jaiani1
</footer>

<script>
let cart=[];

function add(name,price){
let found=cart.find(i=>i.name===name);
if(found){found.qty++;}
else{cart.push({name,price,qty:1});}
render();
}

function render(){
let html="";
let total=0;

cart.forEach((i,index)=>{
total+=i.price*i.qty;
html+=`
<div class="cart-item">
${i.name} x${i.qty} - ${i.price*i.qty}₾
<button onclick="remove(${index})">❌</button>
</div>`;
});

html+=`<b>ჯამი: ${total}₾</b><br>
<button onclick="checkout()">შეკვეთა</button>`;

document.getElementById("cart").innerHTML=html;
}

function remove(i){
cart.splice(i,1);
render();
}

function checkout(){
let msg="შეკვეთა:%0A";
cart.forEach(i=>{
msg+=i.name+" x"+i.qty+"%0A";
});
window.open("https://wa.me/995597122552?text="+msg);
}

function call(){
window.location.href="tel:+995597122552";
}

function whatsapp(){
window.open("https://wa.me/995597122552");
}

function maps(){
window.open("https://maps.google.com");
}

function filter(type){
let cards=document.querySelectorAll('.card');
cards.forEach(c=>{
if(type==='all'){c.style.display='block';}
else{
c.style.display=c.classList.contains(type)?'block':'none';
}
});
}
</script>

</body>
</html>
