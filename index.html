<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENDE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */
header{
background:black;
padding:15px;
text-align:center;
border-bottom:2px solid #ffcc00;
position:sticky;
top:0;
z-index:100;
}

.logo img{
height:60px;
}

/* SEARCH */
.search{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

/* TABS */
.tabs{
display:flex;
overflow:auto;
gap:10px;
padding:10px;
}
.tabs button{
background:#222;
color:white;
border:none;
padding:8px 12px;
border-radius:20px;
}
.tabs button.active{
background:#ffcc00;
color:black;
}

/* MENU */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-content{
padding:10px;
}

button{
background:#ffcc00;
border:none;
padding:8px;
width:100%;
margin-top:5px;
border-radius:6px;
}

/* CART MOBILE */
.cart{
position:fixed;
bottom:0;
left:0;
width:100%;
height:180px;
background:#111;
padding:10px;
overflow:auto;
border-top:2px solid #ffcc00;
}

/* DESKTOP */
@media (min-width:768px){
.cart{
right:0;
top:0;
width:300px;
height:100%;
}
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="https://via.placeholder.com/200x60?text=MENDE">
</div>
<input class="search" placeholder="ძიება..." oninput="searchMenu(this.value)">
</header>

<div class="tabs" id="tabs"></div>

<div class="grid" id="menu"></div>

<div class="cart">
<h3>🛒</h3>
<div id="cart"></div>
<h4 id="total">0₾</h4>
<button onclick="sendWhatsApp()">WhatsApp</button>
<button onclick="callNow()">დარეკვა</button>
</div>

<script>

let phone="9955XXXXXXXX";
let whatsapp="9955XXXXXXXX";

let products=[
{name:"ხაჭაპური",price:14,cat:"ქართული",img:"https://images.unsplash.com/photo-1604908176997-431b6a5f6c2d"},
{name:"ლობიანი",price:10,cat:"ქართული",img:"https://images.unsplash.com/photo-1625944236053-9b7bb2e8d9a1"},
{name:"ქათმის სალათი",price:16,cat:"სალათები",img:"https://images.unsplash.com/photo-1562967916-eb82221dfb36"},
{name:"ოსტრი",price:18,cat:"ცხელი",img:"https://images.unsplash.com/photo-1604909052635-25f5d0f1d4c2"},
{name:"ხარჩო",price:16,cat:"სუპები",img:"https://images.unsplash.com/photo-1605475120433-2c8b3b7b2d3f"},
{name:"ბურიტო ოსტრით",price:20,cat:"street",img:"https://images.unsplash.com/photo-1600891963935-9d1c6f5d6c6d"},
{name:"ქათმის ვრაპი",price:15,cat:"street",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"}
];

let cart=[];

function renderTabs(){
let cats=["ყველა",...new Set(products.map(p=>p.cat))];
let t=document.getElementById("tabs");
t.innerHTML="";
cats.forEach(c=>{
t.innerHTML+=`<button onclick="filterCat('${c}')">${c}</button>`;
});
}

let currentCat="ყველა";

function filterCat(c){
currentCat=c;
renderMenu();
}

function renderMenu(){
let menu=document.getElementById("menu");
menu.innerHTML="";
let list=products.filter(p=>currentCat==="ყველა"||p.cat===currentCat);

list.forEach((p,i)=>{
menu.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h4>${p.name}</h4>
<p>${p.price}₾</p>
<button onclick="add(${i})">დამატება</button>
</div>
</div>`;
});
}

function add(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let c=document.getElementById("cart");
c.innerHTML="";
let total=0;

cart.forEach(x=>{
c.innerHTML+=`<p>${x.name} - ${x.price}₾</p>`;
total+=x.price;
});

document.getElementById("total").innerText=total+"₾";
}

function sendWhatsApp(){
let text="MENDE შეკვეთა:%0A";
cart.forEach(x=>{text+=x.name+"%0A";});
window.open(`https://wa.me/${whatsapp}?text=${text}`);
}

function callNow(){
window.location.href="tel:"+phone;
}

function searchMenu(q){
let filtered=products.filter(p=>p.name.includes(q));
let menu=document.getElementById("menu");
menu.innerHTML="";
filtered.forEach((p,i)=>{
menu.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h4>${p.name}</h4>
<p>${p.price}₾</p>
<button onclick="add(${i})">დამატება</button>
</div>
</div>`;
});
}

renderTabs();
renderMenu();

</script>

</body>
</html>
